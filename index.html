<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Intelligence Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #08080d;
  --bg2: #0e0e16;
  --bg3: #14141e;
  --glass: rgba(255,255,255,0.04);
  --glass2: rgba(255,255,255,0.07);
  --glass3: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --text: #e8e4f0;
  --text2: #9590a8;
  --text3: #5f5878;
  --accent: #a882ff;
  --accent2: #c4a8ff;
  --accentG: rgba(168,130,255,0.12);
  --blue: #60a5fa;
  --green: #6ee7a0;
  --yellow: #fbbf24;
  --red: #f87171;
  --cA: #a882ff;
  --cB: #60a5fa;
  --cC: #6ee7a0;
  --cD: #fbbf24;
  --r: 12px;
  --r2: 16px;
  --t: 0.2s cubic-bezier(0.4,0,0.2,1);
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.hdr{padding:12px 20px;background:rgba(8,8,13,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;z-index:100;flex-shrink:0}
.logo{font-size:16px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.srch{flex:1;max-width:560px;position:relative}
.srch input{width:100%;padding:9px 14px 9px 36px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:var(--t)}
.srch input:focus{border-color:var(--accent);background:var(--accentG);box-shadow:0 0 20px rgba(168,130,255,0.08)}
.srch .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.hstats{display:flex;gap:10px;margin-left:auto;flex-shrink:0}
.sbadge{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--text2);white-space:nowrap}
.sbadge b{color:var(--text);font-weight:600}
.hbtn{padding:6px 12px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;cursor:pointer;transition:var(--t);font-family:inherit}
.hbtn:hover{background:var(--glass2);color:var(--text)}

.tabs{display:flex;padding:6px 20px;gap:4px;background:rgba(8,8,13,0.5);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;transition:var(--t);white-space:nowrap;border:1px solid transparent;background:transparent;color:var(--text2);font-family:inherit}
.tab:hover{background:var(--glass);color:var(--text)}
.tab.on{border-color:var(--accent);background:var(--accentG);color:var(--accent2)}
.tab[data-c="A"].on{border-color:var(--cA);color:var(--cA);background:rgba(168,130,255,0.08)}
.tab[data-c="B"].on{border-color:var(--cB);color:var(--cB);background:rgba(96,165,250,0.08)}
.tab[data-c="C"].on{border-color:var(--cC);color:var(--cC);background:rgba(110,231,160,0.08)}
.tab[data-c="D"].on{border-color:var(--cD);color:var(--cD);background:rgba(251,191,36,0.08)}

.lay{display:grid;grid-template-columns:200px 1fr 0px;flex:1;overflow:hidden;transition:grid-template-columns 0.3s ease}
.lay.open{grid-template-columns:200px 1fr 400px}

.side{padding:12px;border-right:1px solid var(--border);overflow-y:auto;background:rgba(8,8,13,0.3)}
.ftitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin:12px 0 6px;padding:0 8px}
.fitem{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;transition:var(--t)}
.fitem:hover{background:var(--glass);color:var(--text)}
.fitem.on{background:var(--accentG);color:var(--accent2)}
.fcount{font-size:9px;color:var(--text3);background:var(--glass);padding:1px 5px;border-radius:8px}

.res{overflow-y:auto;padding:12px}
.res-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 4px}
.res-cnt{font-size:12px;color:var(--text2)}
.res-sort select{background:var(--glass);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:3px 6px;font-size:10px;font-family:inherit;cursor:pointer}

.card{padding:12px 14px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:var(--t);position:relative;margin-bottom:6px}
.card:hover{background:var(--glass2);border-color:var(--border2);transform:translateX(2px)}
.card.on{border-color:var(--accent);background:var(--accentG)}
.card.used::after{content:'\2713';position:absolute;top:8px;right:10px;color:var(--green);font-size:11px;font-weight:700}
.card.fav::before{content:'\2605';position:absolute;top:8px;right:26px;color:var(--yellow);font-size:11px}
.card-h{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.card-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.card-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)}
.card-t{font-size:13px;font-weight:600}
.card-p{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-m{display:flex;gap:4px;flex-wrap:wrap}
.tg{padding:1px 6px;background:rgba(255,255,255,0.03);border-radius:8px;font-size:9px;color:var(--text3)}
.tg.cat{color:var(--accent);background:rgba(168,130,255,0.06)}
.tg.acc{color:var(--blue);background:rgba(96,165,250,0.06)}
.tg.ser{color:var(--green);background:rgba(110,231,160,0.06)}

.det{border-left:1px solid var(--border);overflow-y:auto;background:rgba(8,8,13,0.4);backdrop-filter:blur(10px)}
.det-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px;padding:20px;text-align:center;line-height:1.6}
.det-c{padding:16px}
.det-hdr{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.det-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:3px}
.det-t{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:6px}
.det-mr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.det-acts{display:flex;gap:6px;margin-top:10px}
.abtn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;transition:var(--t);border:1px solid var(--border);background:var(--glass);color:var(--text2);font-family:inherit}
.abtn:hover{background:var(--glass2);color:var(--text)}
.abtn.af{color:var(--yellow);border-color:rgba(251,191,36,0.25)}
.abtn.au{color:var(--green);border-color:rgba(110,231,160,0.25)}
.abtn.pr{background:var(--accentG);border-color:rgba(168,130,255,0.3);color:var(--accent2)}

.sec{margin-bottom:16px}
.sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.orig{padding:12px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);font-size:12px;line-height:1.7;white-space:pre-wrap}
.orig .ph{color:var(--yellow);font-weight:600}

.anat{display:flex;flex-direction:column;gap:6px}
.ai{padding:8px 12px;background:var(--glass);border:1px solid var(--border);border-radius:8px;border-left:3px solid var(--accent)}
.ai[data-t="role"]{border-left-color:var(--cA)}.ai[data-t="task"]{border-left-color:var(--cD)}.ai[data-t="ctx"]{border-left-color:var(--cB)}.ai[data-t="reason"]{border-left-color:var(--cC)}.ai[data-t="stop"]{border-left-color:var(--red)}.ai[data-t="out"]{border-left-color:var(--blue)}
.ai-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.ai[data-t="role"] .ai-l{color:var(--cA)}.ai[data-t="task"] .ai-l{color:var(--cD)}.ai[data-t="ctx"] .ai-l{color:var(--cB)}.ai[data-t="reason"] .ai-l{color:var(--cC)}.ai[data-t="stop"] .ai-l{color:var(--red)}.ai[data-t="out"] .ai-l{color:var(--blue)}
.ai-t{font-size:11px;color:var(--text2);line-height:1.5}

.master{padding:12px;background:linear-gradient(135deg,rgba(168,130,255,0.04),rgba(96,165,250,0.04));border:1px solid rgba(168,130,255,0.15);border-radius:var(--r);font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:'JetBrains Mono',monospace;position:relative;max-height:400px;overflow-y:auto}
.cpbtn{position:absolute;top:6px;right:6px;padding:3px 8px;border-radius:6px;font-size:9px;cursor:pointer;background:var(--glass2);border:1px solid var(--border);color:var(--text3);transition:var(--t);font-family:inherit}
.cpbtn:hover{color:var(--text)}.cpbtn.ok{color:var(--green)}

.tok-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tok-c{padding:10px;background:var(--glass);border:1px solid var(--border);border-radius:8px;text-align:center}
.tok-v{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tok-l{font-size:9px;color:var(--text3);margin-top:2px}
.tok-cost{grid-column:span 2;padding:8px;background:linear-gradient(135deg,rgba(110,231,160,0.04),rgba(96,165,250,0.04));border:1px solid rgba(110,231,160,0.12);border-radius:8px;text-align:center}
.cost-v{font-size:13px;font-weight:600;color:var(--green);font-family:'JetBrains Mono',monospace}
.cost-l{font-size:9px;color:var(--text3);margin-top:1px}

.sim-i{padding:7px 10px;background:var(--glass);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:var(--t);display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sim-i:hover{background:var(--glass2)}
.sim-t{font-size:11px}.sim-s{font-size:9px;color:var(--text3)}

.ch-i{padding:8px 12px;background:var(--glass);border:1px solid var(--border);border-radius:6px;margin-bottom:4px}
.ch-n{font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:3px}
.ch-s{font-size:10px;color:var(--text2);line-height:1.5}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:560px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.5px}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 12px;background:var(--glass);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:var(--t)}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{height:100px;resize:vertical}
.modal .auto-cat{margin:12px 0;padding:10px;background:var(--accentG);border:1px solid rgba(168,130,255,0.2);border-radius:8px}
.modal .auto-cat-title{font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.modal .auto-cat-val{font-size:12px;color:var(--text)}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.mbtn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--glass);color:var(--text2);font-family:inherit;transition:var(--t)}
.mbtn:hover{background:var(--glass2);color:var(--text)}
.mbtn.save{background:var(--accentG);border-color:rgba(168,130,255,0.3);color:var(--accent2)}
.mbtn.save:hover{background:rgba(168,130,255,0.2)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fadeIn 0.25s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}.si{animation:slideIn 0.2s ease-out}

#loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999;flex-direction:column;gap:16px}
#loader .lt{font-size:24px;font-weight:700;background:linear-gradient(135deg,#a882ff,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#loader .ls{color:#9590a8;font-size:13px}
.spinner{width:32px;height:32px;border:3px solid rgba(168,130,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="lt">⚡ Prompt Intelligence Engine</div>
  <div class="spinner"></div>
  <div class="ls" id="load-status">Lade Prompt-Datenbank...</div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">⚡ Prompt Intelligence Engine</div>
  <div class="srch">
    <span class="ico">🔍</span>
    <input id="search" type="text" placeholder="Suche: Prompts, Tags, Kategorien... (/ zum Fokus)">
  </div>
  <div class="hstats">
    <div class="sbadge"><b id="st-total">0</b> Prompts</div>
    <div class="sbadge"><b id="st-used">0</b> Genutzt</div>
    <div class="sbadge"><b id="st-fav">0</b> ★</div>
  </div>
  <button class="hbtn" onclick="openAddModal()">+ Neu</button>
  <button class="hbtn" onclick="exportAll()">↗ Export</button>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on" data-c="all">Alle</button>
  <button class="tab" data-c="A">A: Prompt-Architektur</button>
  <button class="tab" data-c="B">B: Reasoning & Planning</button>
  <button class="tab" data-c="C">C: Agentic & Automation</button>
  <button class="tab" data-c="D">D: Domain-Anwendungen</button>
  <button class="tab" data-c="fav">★ Favoriten</button>
  <button class="tab" data-c="used">✓ Genutzt</button>
</div>

<!-- LAYOUT -->
<div class="lay" id="layout">
  <div class="side" id="sidebar"></div>
  <div class="res">
    <div class="res-hdr">
      <div class="res-cnt" id="res-cnt">0 Ergebnisse</div>
      <div class="res-sort">
        <select id="sort">
          <option value="rel">Relevanz</option>
          <option value="id+">ID ↑</option>
          <option value="id-">ID ↓</option>
          <option value="az">Titel A-Z</option>
          <option value="cat">Kategorie</option>
        </select>
      </div>
    </div>
    <div id="grid"></div>
  </div>
  <div class="det" id="det">
    <div class="det-empty">Wähle einen Prompt<br>um die Analyse zu sehen</div>
  </div>
</div>

<!-- ADD PROMPT MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Neuen Prompt hinzufügen</h2>
    <label>Prompt Text</label>
    <textarea id="m-text" placeholder="Paste deinen Prompt hier..."></textarea>
    <div class="auto-cat" id="auto-cat" style="display:none">
      <div class="auto-cat-title">🤖 Auto-Kategorisierung</div>
      <div class="auto-cat-val" id="auto-cat-val"></div>
    </div>
    <label>Titel (optional — wird auto-generiert)</label>
    <input id="m-title" placeholder="z.B. Content Strategist">
    <label>Account</label>
    <input id="m-account" placeholder="z.B. @dailyprompter">
    <label>Tags (kommasepariert)</label>
    <input id="m-tags" placeholder="z.B. marketing,content,strategy">
    <label>Serie (optional)</label>
    <input id="m-series" placeholder="z.B. Power Prompts 1/10">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Abbrechen</button>
      <button class="mbtn save" onclick="saveNewPrompt()">Speichern + Kategorisieren</button>
    </div>
  </div>
</div>

<script>
// ==========================================================
// DATA LOADING — fetch from prompt-data.json
// ============================================================
let prompts = [];
let S = { q:'', cluster:'all', cat:null, acc:null, ser:null, sel:null, used:new Set(), fav:new Set(), sort:'rel' };

(async function loadData() {
  const status = document.getElementById('load-status');
  try {
    status.textContent = 'Lade Prompt-Datenbank...';
    const resp = await fetch('prompt-data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    prompts = data.prompts || data;
    document.getElementById('loader').remove();
    boot();
  } catch(e) {
    status.innerHTML = 'prompt-data.json nicht gefunden — JSON manuell laden:<br><br><input type="file" id="fb-file" accept=".json" style="color:#9590a8">';
    document.getElementById('fb-file').addEventListener('change', ev => {
      const r = new FileReader();
      r.onload = fe => {
        const d = JSON.parse(fe.target.result);
        prompts = d.prompts || d;
        document.getElementById('loader').remove();
        boot();
      };
      r.readAsText(ev.target.files[0]);
    });
  }
})();

function boot() {
  document.getElementById('st-total').textContent = prompts.length;
  buildSidebar();
  bindEvents();
  filter();
}

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const cats={}, accs={}, sers={};
  prompts.forEach(p => {
    const ck = p.category;
    cats[ck] = cats[ck] || { n: p.category_de || p.category_en || ck, c: 0 };
    cats[ck].c++;
    if (p.account) accs[p.account] = (accs[p.account]||0) + 1;
    if (p.series) { const b = p.series.replace(/\s*\d+\/\d+$/,''); sers[b] = (sers[b]||0)+1; }
  });
  let h = '<div class="ftitle">Kategorien</div>';
  Object.entries(cats).sort((a,b) => b[1].c - a[1].c).forEach(([k,v]) => {
    h += '<div class="fitem" data-f="cat" data-v="'+k+'"><span>'+k+' '+v.n+'</span><span class="fcount">'+v.c+'</span></div>';
  });
  h += '<div class="ftitle">Accounts</div>';
  Object.entries(accs).sort((a,b) => b[1]-a[1]).forEach(([k,v]) => {
    h += '<div class="fitem" data-f="acc" data-v="'+k+'"><span>'+k+'</span><span class="fcount">'+v+'</span></div>';
  });
  h += '<div class="ftitle">Top Serien</div>';
  Object.entries(sers).sort((a,b) => b[1]-a[1]).slice(0,15).forEach(([k,v]) => {
    h += '<div class="fitem" data-f="ser" data-v="'+k+'"><span>'+k+'</span><span class="fcount">'+v+'</span></div>';
  });
  document.getElementById('sidebar').innerHTML = h;
}

// ============================================================
// EVENTS
// ============================================================
function bindEvents() {
  document.getElementById('search').addEventListener('input', e => { S.q = e.target.value.toLowerCase(); filter(); });
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on'); S.cluster = t.dataset.c; S.cat=S.acc=S.ser=null;
    document.querySelectorAll('.fitem').forEach(f => f.classList.remove('on'));
    filter();
  }));
  document.getElementById('sidebar').addEventListener('click', e => {
    const i = e.target.closest('.fitem'); if(!i) return;
    const f=i.dataset.f, v=i.dataset.v, was=i.classList.contains('on');
    document.querySelectorAll('.fitem[data-f="'+f+'"]').forEach(x => x.classList.remove('on'));
    if(!was){ i.classList.add('on'); S[f]=v; } else S[f]=null;
    filter();
  });
  document.getElementById('sort').addEventListener('change', e => { S.sort=e.target.value; filter(); });
  document.addEventListener('keydown', e => {
    if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();document.getElementById('search').focus()}
    if(e.key==='Escape'){if(S.sel)closeDet();else if(document.getElementById('modal').classList.contains('show'))closeModal();else document.getElementById('search').blur()}
  });
}

// ============================================================
// FILTER + SEARCH
// ============================================================
function filter() {
  let r = prompts.slice();
  if(S.cluster==='fav') r=r.filter(p=>S.fav.has(p.id));
  else if(S.cluster==='used') r=r.filter(p=>S.used.has(p.id));
  else if(S.cluster!=='all') r=r.filter(p=>p.meta_cluster&&p.meta_cluster.startsWith(S.cluster));
  if(S.cat) r=r.filter(p=>p.category===S.cat);
  if(S.acc) r=r.filter(p=>p.account===S.acc);
  if(S.ser) r=r.filter(p=>p.series&&p.series.replace(/\s*\d+\/\d+$/,'')=== S.ser);
  if(S.q){
    const terms=S.q.split(/\s+/);
    r=r.map(p=>{
      const hay=[p.title,p.prompt_text,p.tags,p.category_de,p.category_en,p.account,p.series,p.id].join(' ').toLowerCase();
      let sc=0,ok=true;
      terms.forEach(t=>{if(hay.includes(t)){sc+=(p.title||'').toLowerCase().includes(t)?3:1;sc+=(p.tags||'').toLowerCase().includes(t)?2:0}else ok=false});
      return Object.assign({},p,{_sc:sc,_ok:ok});
    }).filter(p=>p._ok);
  }
  switch(S.sort){
    case'rel':if(S.q)r.sort((a,b)=>(b._sc||0)-(a._sc||0));break;
    case'id+':r.sort((a,b)=>a.id.localeCompare(b.id));break;
    case'id-':r.sort((a,b)=>b.id.localeCompare(a.id));break;
    case'az':r.sort((a,b)=>(a.title||'').localeCompare(b.title||''));break;
    case'cat':r.sort((a,b)=>(a.category||'').localeCompare(b.category||''));break;
  }
  render(r);
}

// ============================================================
// ANATOMY PARSER
// ============================================================
function parseAnat(p){
  const t=p.prompt_text||'',a=[];
  if(/^(act as|you are|imagine|pretend|as a|du bist|sei ein)/i.test(t)){
    const m=t.match(/^([^.!]+[.!])/);
    a.push({t:'role',e:'🎭',l:'Role',x:m?m[1]:t.substring(0,80)});
  } else a.push({t:'role',e:'🎭',l:'Role',x:'⚠ Nicht definiert — füge eine Experten-Rolle hinzu'});
  const s1=t.split(/[.!]\s+/);
  a.push({t:'task',e:'📋',l:'Task',x:s1[0]||t.substring(0,100)});
  const ph=t.match(/\[([^\]]+)\]/g);
  a.push({t:'ctx',e:'📎',l:'Context',x:ph?'Variablen: '+ph.join(', '):"⚠ Keine Variablen — Prompt ist generisch"});
  if(/(analyze|think|examine|consider|evaluate|compare|step by step|break down)/i.test(t)){
    a.push({t:'reason',e:'🧠',l:'Reasoning',x:'Analytischer Denkprozess erkannt'});
  } else a.push({t:'reason',e:'🧠',l:'Reasoning',x:"⚠ Kein Reasoning — empfohlen: \"Think step by step\" hinzufügen"});
  if(/(no more than|maximum|limit|within \d|not exceed)/i.test(t)){
    a.push({t:'stop',e:'🛑',l:'Stop Conditions',x:'Begrenzungen erkannt'});
  } else a.push({t:'stop',e:'🛑',l:'Stop Conditions',x:'⚠ Keine Limits — definiere Länge/Umfang'});
  if(/(list|table|json|format|structure|outline|steps|numbered|bullet)/i.test(t)){
    a.push({t:'out',e:'📄',l:'Output Format',x:'Strukturiertes Format erkannt'});
  } else a.push({t:'out',e:'📄',l:'Output Format',x:'⚠ Kein Format — definiere die gewünschte Struktur'});
  return a;
}

// ============================================================
// MASTER PROMPT GENERATOR
// ============================================================
function genMaster(p){
  const t=p.prompt_text||'',ph=(t.match(/\[([^\]]+)\]/g)||[]).join(', '),cat=p.category||'';
  const roles={'A':'Prompt Engineering Architect','B':'Strategic Reasoning Expert','C':'AI Automation Architect',
    'D-01':'Senior Content Strategist','D-02':'Expert Educator','D-03':'Senior Software Engineer',
    'D-04':'Business Strategy Consultant','D-05':'Career Coach','D-06':'Growth Marketing Expert',
    'D-07':'Health & Wellness Professional','D-08':'Productivity Coach','D-09':'Creative Director',
    'D-10':'Lifestyle Optimization Specialist','D-11':'Mindfulness & Self-Awareness Guide'};
  const role=roles[cat]||roles[cat[0]]||'Domain Expert';
  return '# '+(p.title||'Enhanced Prompt')+' — Master Version\n\n'+
    '🎭 ROLE\nYou are a '+role+' with 15+ years of deep expertise. You communicate with clarity, depth, and actionable precision.\n\n'+
    '📋 TASK\n'+t+'\n\n'+
    '📎 CONTEXT\n'+(ph?'Variables: '+ph:'Adapt to the user\'s specific situation.')+'\nCategory: '+(p.category_de||p.category_en||cat)+'\n'+(p.series?'Series: '+p.series+'\n':'')+'\n'+
    '🧠 REASONING\nBefore answering, think step by step:\n1. Analyze the user\'s specific situation and constraints\n2. Consider multiple approaches — select the optimal one\n3. Anticipate follow-up questions proactively\n4. Validate recommendations against real-world practicality\n\n'+
    '🛑 STOP CONDITIONS\n- Max 800 words unless complexity requires more\n- No generic filler or disclaimers\n- Quality over quantity — stop when all key points are covered\n\n'+
    '📄 OUTPUT FORMAT\n1. Executive Summary (2-3 sentences)\n2. Core Analysis/Recommendations (numbered, detailed)\n3. Quick-Win Actions (3 things to do right now)\n4. Advanced Tips (for going deeper)';
}

// ============================================================
// SIMILARITY ENGINE
// ============================================================
function findSim(p,n){
  const tags=new Set((p.tags||'').split(',').map(t=>t.trim().toLowerCase()));
  return prompts.filter(x=>x.id!==p.id).map(x=>{
    let sc=0;const xt=new Set((x.tags||'').split(',').map(t=>t.trim().toLowerCase()));
    tags.forEach(t=>{if(xt.has(t))sc+=15});
    if(x.category===p.category)sc+=20;
    if(x.meta_cluster===p.meta_cluster)sc+=5;
    if(p.series&&x.series&&x.series.replace(/\s*\d+\/\d+$/,'')=== p.series.replace(/\s*\d+\/\d+$/,''))sc+=30;
    if(x.account===p.account)sc+=3;
    const tw=new Set((p.title||'').toLowerCase().split(/\s+/));
    (x.title||'').toLowerCase().split(/\s+/).forEach(w=>{if(tw.has(w)&&w.length>3)sc+=8});
    return Object.assign({},x,{_ss:Math.min(sc,99)});
  }).filter(x=>x._ss>10).sort((a,b)=>b._ss-a._ss).slice(0,n);
}

// ============================================================
// CHAINS
// ============================================================
function getChains(p){
  const c=p.category||'',chains=[];
  const tpl=[
    {r:/^D-0[146]/,n:'📊 Research → Content → Distribution',s:'1. B-02 Recherche → 2. D-01 Content → 3. D-06 Marketing → 4. A-02 Optimierung'},
    {r:/^D-11/,n:'🧘 Discovery → Reflection → Action',s:'1. D-11 Selbsterkenntnis → 2. D-08 Aktionsplan → 3. D-07 Wellness'},
    {r:/^D-05/,n:'💼 Career Pipeline',s:'1. D-05 CV → 2. D-05 Interview → 3. D-04 Strategie → 4. D-06 Personal Brand'},
    {r:/^D-04/,n:'🚀 Business Launch',s:'1. B-02 Marktanalyse → 2. D-04 Strategie → 3. D-06 Marketing → 4. D-01 Content'},
    {r:/^A-/,n:'🧬 Prompt Engineering Flow',s:'1. A-01 Rolle → 2. A-02 Technik → 3. A-04 Output → 4. A-05 Meta-Optimierung'},
    {r:/^D-07/,n:'💚 Health Routine',s:'1. D-07 Plan → 2. D-08 Tracking → 3. D-10 Lifestyle → 4. D-11 Mindfulness'},
    {r:/^C-/,n:'🤖 Automation Setup',s:'1. C-01 Workflow → 2. C-03 Tools → 3. C-02 Agents → 4. A-05 System-Prompt'},
    {r:/^D-10/,n:'✈️ Travel Optimizer',s:'1. D-10 Planung → 2. D-04 Budget → 3. D-08 Zeitmanagement'},
    {r:/^D-09/,n:'🎨 Creative Pipeline',s:'1. B-02 Research → 2. D-09 Design → 3. D-01 Copy → 4. D-06 Distribution'},
  ];
  tpl.forEach(t=>{if(t.r.test(c))chains.push({n:t.n,s:t.s})});
  if(!chains.length)chains.push({n:'🔄 Universal Enhancement',s:'1. Basis-Prompt → 2. A-02 Technik → 3. A-05 Meta-Prompt → 4. Iteration'});
  return chains;
}

// ============================================================
// TOKEN ESTIMATOR
// ============================================================
function estTok(p,m){
  const inp=Math.ceil((m||p.prompt_text||'').length/4);
  const mul=p.category&&p.category[0]==='A'?2:p.category&&p.category[0]==='B'?3:2.5;
  const out=Math.ceil(inp*mul);
  const cost=((inp*3/1e6)+(out*15/1e6)).toFixed(4);
  return{i:inp.toLocaleString(),o:out.toLocaleString(),c:cost};
}

// ============================================================
// AUTO-CATEGORIZATION ENGINE
// ============================================================
const CAT_KEYWORDS = {
  'A-01': ['act as','you are','persona','role','pretend','imagine you'],
  'A-02': ['prompt technique','few-shot','chain of thought','writing style','voice','tone','analyze my writing'],
  'A-04': ['output format','json','markdown','table','structure'],
  'A-05': ['meta-prompt','generate prompts','prompt generator','best prompts','guide to using'],
  'B-01': ['mental model','reasoning','think step','decision','framework','logic'],
  'B-02': ['research','analyze','compare','synthesize','investigate','evaluate'],
  'C-01': ['workflow','automate','pipeline','sequence'],
  'C-02': ['agent','autonomous','multi-step'],
  'C-03': ['tool','integration','software','app','platform'],
  'D-01': ['blog','article','content','copywriting','headline','writing','title','caption'],
  'D-02': ['teach','learn','explain','curriculum','education','course','study','simplif'],
  'D-03': ['code','programming','debug','algorithm','function','API','developer'],
  'D-04': ['business','strategy','revenue','market','investor','startup','financial plan','profit','entrepreneur'],
  'D-05': ['resume','career','interview','job','hire','cover letter','CV','salary'],
  'D-06': ['marketing','sales','conversion','lead','SEO','social media','campaign','email','CTA','ad ','growth'],
  'D-07': ['health','fitness','wellness','exercise','diet','sleep','medical','workout','nutrition'],
  'D-08': ['productivity','habit','time management','focus','procrastination','goal','routine','schedule','ADHD'],
  'D-09': ['design','visual','UI','UX','creative','graphic','logo','brand identity'],
  'D-10': ['travel','flight','hotel','cooking','recipe','lifestyle','vacation','booking'],
  'D-11': ['mindset','self-awareness','meditation','journal','shadow work','values','emotion','spiritual','belief','inner voice','psychology','self-sabotage'],
};

const CAT_NAMES = {
  'A-01':'Rollen & Personas','A-02':'Prompt-Techniken','A-04':'Output-Formate','A-05':'Meta-Prompting',
  'B-01':'Chain-of-Thought & Reasoning','B-02':'Analyse & Recherche',
  'C-01':'Workflow-Design','C-02':'Multi-Agent','C-03':'Tool-Integrationen',
  'D-01':'Content & Copywriting','D-02':'Bildung & Lernen','D-03':'Code & Development',
  'D-04':'Business & Strategie','D-05':'Karriere & Bewerbung','D-06':'Marketing & Sales',
  'D-07':'Gesundheit & Wellness','D-08':'Produktivität & Selbstmanagement',
  'D-09':'Design & Visual','D-10':'Reise & Lifestyle','D-11':'Spiritualität & Selbsterkenntnis'
};

const CLUSTER_NAMES = {
  'A':'A: Prompt-Architektur','B':'B: Reasoning & Planning','C':'C: Agentic & Automation','D':'D: Domain-Anwendungen'
};

function autoCateg(text){
  const lower = text.toLowerCase();
  let best = null, bestScore = 0;
  Object.entries(CAT_KEYWORDS).forEach(([cat, keywords]) => {
    let score = 0;
    keywords.forEach(kw => {
      if (lower.includes(kw)) score += kw.split(' ').length;
    });
    if (score > bestScore) { bestScore = score; best = cat; }
  });
  if (!best) best = 'D-01';
  return {
    category: best,
    category_de: CAT_NAMES[best] || best,
    meta_cluster: CLUSTER_NAMES[best[0]] || 'D: Domain-Anwendungen',
    confidence: Math.min(Math.round(bestScore / 3 * 100), 99)
  };
}

function autoTitle(text){
  const m = text.match(/^(create|build|design|write|generate|find|show|explain|analyze|teach|make|help|give|list|transform|train|search|act as|you are)\s+(.{5,40}?)[\s,.!]/i);
  if (m) return m[0].trim().replace(/[.!,]$/,'');
  return text.substring(0, 40).replace(/[.!,]$/,'').trim();
}

function autoTags(text, category){
  const lower = text.toLowerCase();
  const allTags = new Set();
  (CAT_KEYWORDS[category] || []).forEach(kw => {
    if (lower.includes(kw)) allTags.add(kw.replace(/\s+/g,'-'));
  });
  (text.match(/\[([^\]]+)\]/g) || []).forEach(ph => {
    allTags.add(ph.replace(/[\[\]]/g,'').toLowerCase().replace(/\s+/g,'-'));
  });
  return Array.from(allTags).slice(0, 8).join(',');
}

// ============================================================
// ADD PROMPT MODAL
// ============================================================
function openAddModal(){document.getElementById('modal').classList.add('show');document.getElementById('m-text').focus();
 document.getElementById('m-text').addEventListener('input', debounce(autoPreview, 500));
}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function autoPreview(){
  const text = document.getElementById('m-text').value;
  if (text.length < 20) { document.getElementById('auto-cat').style.display='none'; return; }
  const cat = autoCateg(text);
  const title = autoTitle(text);
  const tags = autoTags(text, cat.category);
  document.getElementById('auto-cat').style.display='block';
  document.getElementById('auto-cat-val').innerHTML =
    '<b>Kategorie:</b> '+cat.category+' '+cat.category_de+' ('+cat.confidence+'% Confidence)<br>'+
    '<b>Cluster:</b> '+cat.meta_cluster+'<br>'+
    '<b>Titel-Vorschlag:</b> '+esc(title)+'<br>'+
    '<b>Auto-Tags:</b> '+tags;
  if (!document.getElementById('m-title').value) document.getElementById('m-title').placeholder = title;
  if (!document.getElementById('m-tags').value) document.getElementById('m-tags').placeholder = tags;
}

function saveNewPrompt(){
  const text = document.getElementById('m-text').value.trim();
  if (!text) return alert('Prompt-Text ist leer!');
  const cat = autoCateg(text);
  const nextId = 'PL-' + String(prompts.length + 1).padStart(4,'0');
  const newPrompt = {
    id: nextId, file: 'manual-add',
    account: document.getElementById('m-account').value.trim() || 'manual',
    platform: 'Manual',
    title: document.getElementById('m-title').value.trim() || autoTitle(text),
    prompt_text: text, category: cat.category, category_de: cat.category_de,
    category_en: CAT_NAMES[cat.category] || cat.category,
    meta_cluster: cat.meta_cluster,
    tags: document.getElementById('m-tags').value.trim() || autoTags(text, cat.category),
    lang: /[äöüß]/i.test(text) ? 'DE' : 'EN',
    series: document.getElementById('m-series').value.trim() || null
  };
  prompts.push(newPrompt);
  document.getElementById('st-total').textContent = prompts.length;
  buildSidebar();
  closeModal();
  filter();
  sel(nextId);
  ['m-text','m-title','m-account','m-tags','m-series'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('auto-cat').style.display = 'none';
}

function debounce(fn, ms){let t;return function(){const a=arguments;clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}}
